<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Coqueiro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header style="border-radius: 0 0 10px 10px;">
        <div class="header-container">
            <img src="logo.png" alt="Logo Coqueiro" class="logo">
            <div>
                <h1>Painel de Controle</h1>
                <p>Cadastro de Cardápio</p>
            </div>
        </div>
        <a href="index.html" style="color: white; text-decoration: none; font-weight: bold;">Ver Site</a>
    </header>

    <main style="padding: 20px; max-width: 500px; margin: 0 auto;">
        <div style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
            <h2 style="margin-bottom: 20px; font-size: 1.3rem; color: var(--cor-primaria);">Novo Lanche</h2>
            
            <form id="form-cadastro">
                <div style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom: 5px; font-weight: 600;">Nome do Lanche:</label>
                    <input type="text" id="nome" required style="width:100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px;">
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom: 5px; font-weight: 600;">Categoria:</label>
                    <select id="categoria" required style="width:100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; background: white;">
                        <option value="xis">Xis</option>
                        <option value="hamburguer">Hambúrguer</option>
                        <option value="porcoes">Porções</option>
                        <option value="bebidas">Bebidas</option>
                    </select>
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom: 5px; font-weight: 600;">Preço (R$):</label>
                    <input type="number" id="preco" step="0.01" required style="width:100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px;">
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom: 5px; font-weight: 600;">URL da Imagem:</label>
                    <input type="url" id="imagemUrl" placeholder="https://linkdafoto.com/imagem.jpg" required style="width:100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px;">
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="display:block; margin-bottom: 5px; font-weight: 600;">Descrição / Ingredientes:</label>
                    <textarea id="descricao" rows="3" required style="width:100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; resize: none;"></textarea>
                </div>

                <button type="submit" style="width: 100%; background: var(--cor-primaria); color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem;">Cadastrar no Cardápio</button>
            </form>
        </div>
    </main>

    <script type="module" src="admin.js"></script>
</body>
</html>
