<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Coqueiro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header style="border-radius: 0 0 10px 10px;">
        <div class="header-container">
            <img src="logo.png" alt="Logo Coqueiro" class="logo" onerror="this.src='logo.jpg'">
            <div>
                <h1>Painel de Controle</h1>
                <p>Gerenciamento do Cardápio</p>
            </div>
        </div>
        <a href="index.html" style="color: white; text-decoration: none; font-weight: bold;"><i class="fas fa-eye"></i> Ver Site</a>
    </header>

    <main style="padding: 20px; max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px;">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px; flex-wrap: wrap; gap: 15px;">
            <h2 style="font-size: 1.4rem; color: #333; margin: 0;">Itens do Cardápio</h2>
            <button id="btn-abrir-cadastro" style="background: var(--cor-primaria); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 10px rgba(19, 131, 66, 0.2);">
                <i class="fas fa-plus"></i> Adicionar Lanche
            </button>
        </div>

        <div style="background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; gap: 15px; flex-wrap: wrap;">
            <div style="flex: 2; min-width: 250px; position: relative;">
                <input type="text" id="busca-nome" placeholder="Pesquisar por nome ou ingrediente..." style="width: 100%; padding: 12px 12px 12px 40px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem;">
                <i class="fas fa-search" style="position: absolute; left: 15px; top: 16px; color: #999;"></i>
            </div>
            
            <div style="flex: 1; min-width: 150px;">
                <select id="filtro-categoria" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: white; font-size: 0.95rem; cursor: pointer;">
                    <option value="todos">👁️ Mostrar Todas</option>
                    <option value="xis">Xis</option>
                    <option value="hamburguer">Hambúrguer</option>
                    <option value="porcoes">Porções</option>
                    <option value="bebidas">Bebidas</option>
                </select>
            </div>
        </div>

        <div style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow-x: auto;">
            <table style="width: 100%; border-collapse: collapse; text-align: left;">
                <thead>
                    <tr style="border-bottom: 2px solid #eee; background: #f9f9f9;">
                        <th style="padding: 12px 10px;">Foto</th>
                        <th style="padding: 12px 10px;">Nome</th>
                        <th style="padding: 12px 10px;">Categoria</th>
                        <th style="padding: 12px 10px;">Preço</th>
                        <th style="padding: 12px 10px; text-align: center;">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-lanches">
                    </tbody>
            </table>
        </div>

    </main>

    <div id="modal-lanche" class="modal-bg hidden">
        <div class="modal-content" style="max-width: 480px; width: 90%; max-height: 90vh; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 id="form-titulo" style="color: var(--cor-primaria); font-size: 1.3rem; margin: 0;">Novo Lanche</h2>
                <button type="button" id="btn-fechar-modal" style="background: none; border: none; font-size: 1.6rem; cursor: pointer; color: #999;">&times;</button>
            </div>
            
            <form id="form-cadastro">
                <input type="hidden" id="lanche-id">

                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem;">Nome do Lanche:</label>
                    <input type="text" id="nome" required style="width:100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px;">
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem;">Categoria:</label>
                    <select id="categoria" required style="width:100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; background: white;">
                        <option value="xis">Xis</option>
                        <option value="hamburguer">Hambúrguer</option>
                        <option value="porcoes">Porções</option>
                        <option value="bebidas">Bebidas</option>
                    </select>
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem;">Preço (R$):</label>
                    <input type="number" id="preco" step="0.01" required style="width:100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px;">
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem;">URL da Imagem:</label>
                    <input type="url" id="imagemUrl" placeholder="https://linkdafoto.com/foto.jpg" required style="width:100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px;">
                </div>

                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display:block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem;">Descrição / Ingredientes:</label>
                    <textarea id="descricao" rows="3" required style="width:100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; resize: none; font-family: inherit;"></textarea>
                </div>

                <button type="submit" id="btn-submit" style="width: 100%; background: var(--cor-primaria); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem;">Salvar Lanche</button>
            </form>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
